<nz-card nzTitle="Danh sach thiet bi">
  <div *ngIf="errorMessage" style="margin-bottom: 16px; color: #d4380d; font-weight: 500;">
    {{ errorMessage }}
  </div>

  <div style="margin-bottom: 16px;">
    <input
      nz-input
      [ngModel]="searchKeyword"
      (ngModelChange)="onSearchChange($event)"
      placeholder="Tim theo ten, ma hoac trang thai"
    />
  </div>

  <ng-container *ngIf="authService.isAdmin()">
    <form nz-form [formGroup]="form" (ngSubmit)="submit()" style="margin-bottom: 24px;">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">
        <input nz-input formControlName="name" placeholder="Ten thiet bi" />
        <input nz-input formControlName="code" placeholder="Ma thiet bi" />
        <input nz-input type="number" formControlName="quantity" placeholder="So luong" />
        <input nz-input formControlName="status" placeholder="AVAILABLE / OUT_OF_STOCK" />
      </div>

      <div style="margin-top:12px; display:flex; gap:12px;">
        <button nz-button nzType="primary" [nzLoading]="submitting">
          {{ editingDeviceId ? 'Cap nhat thiet bi' : 'Them thiet bi' }}
        </button>

        <button
          *ngIf="editingDeviceId"
          type="button"
          nz-button
          nzType="default"
          (click)="cancelEdit()"
        >
          Huy
        </button>
      </div>
    </form>
  </ng-container>

  <nz-table [nzData]="filteredDevices" [nzLoading]="loading" nzBordered>
    <thead>
      <tr>
        <th>Ten</th>
        <th>Ma</th>
        <th>So luong</th>
        <th>Trang thai</th>
        <th *ngIf="authService.isAdmin()">Thao tac</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let d of filteredDevices">
        <td>{{ d.name }}</td>
        <td>{{ d.code }}</td>
        <td>{{ d.quantity }}</td>
        <td>{{ d.status }}</td>
        <td *ngIf="authService.isAdmin()" style="display:flex; gap:8px;">
          <button nz-button (click)="startEdit(d)">Cap nhat</button>
          <button nz-button nzDanger (click)="deleteDevice(d.id)">Xoa</button>
        </td>
      </tr>
    </tbody>
  </nz-table>
</nz-card>
