<nz-card nzTitle="Danh sách thiết bị">
  <div *ngIf="errorMessage" style="margin-bottom: 16px; color: #d4380d; font-weight: 500;">
    {{ errorMessage }}
  </div>

  <div style="margin-bottom: 16px;">
    <input
      nz-input
      [ngModel]="searchKeyword"
      (ngModelChange)="onSearchChange($event)"
      placeholder="Tìm theo tên, mã hoặc trạng thái"
    />
  </div>

  <ng-container *ngIf="authService.isAdmin()">
    <form nz-form [formGroup]="form" (ngSubmit)="submit()" style="margin-bottom: 24px;">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">
        <input nz-input formControlName="name" placeholder="Tên thiết bị" />
        <input nz-input formControlName="code" placeholder="Mã thiết bị" />
        <input nz-input type="number" formControlName="quantity" placeholder="Số lượng" />
        <input nz-input formControlName="status" placeholder="Có Sẵn / OUT_OF_STOCK" />
      </div>

      <div style="margin-top:12px; display:flex; gap:12px;">
        <button nz-button nzType="primary" [nzLoading]="submitting">
          {{ editingDeviceId ? 'Cập nhật thiết bị' : 'Thêm thiết bị' }}
        </button>

        <button
          *ngIf="editingDeviceId"
          type="button"
          nz-button
          nzType="default"
          (click)="cancelEdit()"
        >
          Huy
        </button>
      </div>
    </form>
  </ng-container>

  <nz-table [nzData]="filteredDevices" [nzLoading]="loading" nzBordered>
    <thead>
      <tr>
        <th>Tên</th>
        <th>Mã</th>
        <th>Số lượng</th>
        <th>Trạng thái</th>
        <th *ngIf="authService.isAdmin()">Thao tác</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let d of filteredDevices">
        <td>{{ d.name }}</td>
        <td>{{ d.code }}</td>
        <td>{{ d.quantity }}</td>
        <td>{{ d.status }}</td>
        <td *ngIf="authService.isAdmin()" style="display:flex; gap:8px;">
          <button nz-button (click)="startEdit(d)">Cập nhật</button>
          <button nz-button nzDanger (click)="deleteDevice(d.id)">Xóa</button>
        </td>
      </tr>
    </tbody>
  </nz-table>
</nz-card>
