<div class="auth-shell">
  <div class="auth-hero">
    <p class="auth-eyebrow">Tạo tài khoản</p>
    <h1>Tạo tài khoản mới cho hệ thống</h1>
    <p class="auth-copy">
      Đăng ký người dùng mới để truy cập tổng quan, quản lý thiết bị và phiếu mượn trả.
    </p>
  </div>

  <nz-card class="auth-card">
    <h2>Đăng ký</h2>
    <p class="auth-card-copy">Điền đầy đủ thông tin để tạo tài khoản mới.</p>

    <nz-alert *ngIf="errorMessage" nzType="error" [nzMessage]="errorMessage" nzShowIcon></nz-alert>
    <nz-alert
      *ngIf="isSuccess"
      nzType="success"
      nzMessage="Đăng ký thành công. Đang chuyển sang trang đăng nhập."
      nzShowIcon
    ></nz-alert>

    <form nz-form [formGroup]="registerForm" (ngSubmit)="submit()" class="auth-form">
      <nz-form-item>
        <nz-form-control [nzErrorTip]="'Nhập họ tên hợp lệ'">
          <nz-input-group nzPrefixIcon="user">
            <input nz-input type="text" formControlName="name" placeholder="Họ và tên" />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control [nzErrorTip]="'Email không hợp lệ'">
          <nz-input-group nzPrefixIcon="mail">
            <input nz-input type="email" formControlName="email" placeholder="Email" />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-control [nzErrorTip]="'Mật khẩu tối thiểu 6 ký tự'">
          <nz-input-group nzPrefixIcon="lock">
            <input nz-input type="password" formControlName="password" placeholder="Mật khẩu" />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <button nz-button nzType="primary" nzBlock [nzLoading]="isSubmitting">Tạo tài khoản</button>
    </form>

    <p class="auth-switch">
      Đã có tài khoản?
      <a routerLink="/login">Đăng nhập</a>
    </p>
  </nz-card>
</div>
