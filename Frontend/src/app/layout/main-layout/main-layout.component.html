<nz-layout class="app-shell">
  <nz-sider
    class="app-sider"
    nzCollapsible
    nzBreakpoint="lg"
    [nzCollapsed]="isCollapsed"
    [nzTrigger]="null"
    [nzWidth]="240"
  >
    <app-sidebar [isCollapsed]="isCollapsed"></app-sidebar>
  </nz-sider>

  <nz-layout class="app-main">
    <app-header [isCollapsed]="isCollapsed" (toggleMenu)="toggleSidebar()"></app-header>

    <nz-content class="app-content">
      <div class="content-card">
        <router-outlet></router-outlet>
      </div>
    </nz-content>
  </nz-layout>
</nz-layout>
