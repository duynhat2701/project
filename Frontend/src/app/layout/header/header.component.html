<nz-header class="app-header">
  <div class="header-left">
    <button nz-button nzType="text" class="menu-trigger" (click)="onToggleMenu()">
      <span nz-icon [nzType]="isCollapsed ? 'menu-unfold' : 'menu-fold'"></span>
    </button>

    <div class="brand-block">
      <p class="eyebrow">Device Hub</p>
      <h1>Device Management System</h1>
    </div>
  </div>

  <div class="header-right">
    <div class="account-card" *ngIf="currentUser as user">
      <div class="account-avatar">{{ userInitials }}</div>
      <div class="account-meta">
        <strong>{{ user.name }}</strong>
        <span>{{ user.email }}</span>
      </div>
      <button nz-button nzType="default" class="logout-button" (click)="logout()">Đăng xuất</button>
    </div>
  </div>
</nz-header>
