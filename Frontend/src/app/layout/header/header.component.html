<nz-header class="app-header">
  <div class="header-left">
    <button nz-button nzType="text" class="menu-trigger" (click)="onToggleMenu()">
      <span nz-icon [nzType]="isCollapsed ? 'menu-unfold' : 'menu-fold'"></span>
    </button>

    <div class="brand-block">
      <p class="eyebrow">Device Hub</p>
      <h1>Device Management System</h1>
    </div>
  </div>

  <div class="header-right">
    <div class="header-actions">
      <button
        nz-button
        nzType="text"
        class="contact-button contact-button-alert"
        [class.contact-button-alert-active]="hasUnreadNotifications"
        [attr.aria-label]="notificationLabel"
        [attr.title]="notificationLabel"
        (click)="toggleNotifications($event)"
      >
        <span nz-icon nzType="bell"></span>
        <span class="contact-badge" *ngIf="hasUnreadNotifications">{{ notificationCount }}</span>
      </button>

      <div class="notification-panel" *ngIf="isNotificationOpen">
        <div class="notification-panel-header">
          <strong>Thông Báo</strong>
          <span>{{ notificationCount }} moi</span>
        </div>

        <div class="notification-empty" *ngIf="!notificationItems.length">
          Không có thông báo nào để hiển thị.
        </div>

        <div class="notification-list" *ngIf="notificationItems.length">
          <div class="notification-item" *ngFor="let item of notificationItems">
            <div class="notification-item-head">
              <strong>{{ item.title }}</strong>
              <span>{{ item.timeLabel }}</span>
            </div>
            <p>{{ item.detail }}</p>
            <small>{{ item.status }}</small>
          </div>
        </div>
      </div>
    </div>
  </div>
</nz-header>
