<div class="sidebar-shell">
  <div class="sidebar-brand" [class.sidebar-brand-collapsed]="isCollapsed" *ngIf="currentUser as user">
    <div class="brand-mark">{{ userInitials }}</div>
    <div class="brand-copy" *ngIf="!isCollapsed">
      <strong>{{ user.name }}</strong>
      <span>{{ user.email }}</span>
    </div>
  </div>

  <ul nz-menu nzTheme="dark" nzMode="inline" [nzInlineCollapsed]="isCollapsed" class="sidebar-menu">
    <li nz-menu-item routerLink="/dashboard" routerLinkActive="ant-menu-item-selected">
      <span nz-icon nzType="dashboard"></span>
      <span>Dashboard</span>
    </li>

    <li nz-menu-item routerLink="/devices" routerLinkActive="ant-menu-item-selected">
      <span nz-icon nzType="appstore"></span>
      <span>Thiết Bị</span>
    </li>

    <li nz-menu-item routerLink="/borrow" routerLinkActive="ant-menu-item-selected">
      <span nz-icon nzType="form"></span>
      <span>Mượn / Trả</span>
    </li>
  </ul>

  <button
    *ngIf="!isCollapsed"
    nz-button
    nzType="primary"
    class="sidebar-logout"
    (click)="authService.logout()"
    routerLink="/login"
  >
    Đăng Xuất
  </button>
</div>
