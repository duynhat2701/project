<div class="wrapper-cart">
  <h1>Shopping Cart</h1>

  <div class="group-cart">
    <div class="cart-toolbar">
      <input
        type="search"
        name="search"
        [(ngModel)]="searchTerm"
        class="search-input"
        placeholder="Tim theo ten san pham"
      />
      <button type="button" class="btn-main action-button" (click)="openCreateModal()" [disabled]="isLoading">
        Them san pham
      </button>
    </div>
    <p class="error-message" *ngIf="pageErrorMessage">{{ pageErrorMessage }}</p>
    <p class="empty-state" *ngIf="isLoading">Dang tai du lieu...</p>

    <div class="header-cart">
      <div class="col-1">Image</div>
      <div class="col-2">Name</div>
      <div class="col-3">Price</div>
      <div class="col-4">Action</div>
    </div>
    <div class="body-cart">
      <p class="empty-state" *ngIf="!isLoading && products.length === 0">Chua co san pham nao.</p>
      <p class="empty-state" *ngIf="!isLoading && products.length > 0 && filteredProducts.length === 0">
        Khong tim thay san pham phu hop.
      </p>
      <div class="row-cart" *ngFor="let product of filteredProducts">
        <div class="col-1">
          <a [routerLink]="['/detail', product.id]">
            <img width="50" [src]="product.imageUrl" [alt]="product.name" />
          </a>
        </div>
        <div class="col-2">{{ product.name }}</div>
        <div class="col-3">{{ product.price | currencyPipe }}</div>
        <div class="col-4">
          <div class="action-group">
            <button type="button" class="btn-main action-button edit-link" (click)="openEditModal(product)">
              <img width="20px" height="auto"
                   src="assets/images/arrow-rotate-right-solid.png"
                   alt="Update">
            </button>
            <button type="button" class="btn-main action-button" (click)="deleteProduct(product.id)">
              <img width="20px" height="auto"
                   src="assets/images/trash-can-solid.png"
                   alt="Delete">
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" *ngIf="isModalOpen" (click)="closeModal()">
    <div class="modal-card" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>{{ isEditMode ? 'Cap nhat san pham' : 'Them san pham' }}</h2>
        <button type="button" class="modal-close" (click)="closeModal()">X</button>
      </div>

      <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

      <form #productNgForm="ngForm" (ngSubmit)="submitForm()" class="product-form">
        <label>
          <span>Ten san pham</span>
          <input
            type="text"
            name="name"
            [(ngModel)]="productForm.name"
            required
            placeholder="Nhap ten san pham"
          />
        </label>

        <label>
          <span>Gia</span>
          <input
            type="number"
            name="price"
            [(ngModel)]="productForm.price"
            min="1"
            required
            placeholder="Nhap gia"
          />
        </label>

        <label>
          <span>Hinh Anh San Pham</span>
          <input
            type="file"
            name="imageFile"
            accept="image/*"
            (change)="onImageSelected($event)"
          />
        </label>
        <div class="preview-box" *ngIf="displayImageUrl">
          <span>Xem truoc</span>
          <img [src]="displayImageUrl" [alt]="productForm.name || 'product preview'" />
        </div>

        <div class="modal-actions">
          <button type="button" class="secondary-button" (click)="closeModal()">Huy</button>
          <button type="submit" class="btn-main action-button" [disabled]="productNgForm.invalid || isSubmitting">
            {{ isSubmitting ? 'Dang xu ly...' : (isEditMode ? 'Luu thay doi' : 'Tao san pham') }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
