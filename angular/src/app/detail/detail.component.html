<div class="detail-page">
  <div class="detail-card" *ngIf="isLoading">
    <div class="detail-content">
      <p class="detail-label">Chi tiet san pham</p>
      <h2>Dang tai...</h2>
    </div>
  </div>

  <div class="detail-card" *ngIf="product; else notFound">
    <img [src]="product.imageUrl" [alt]="product.name" class="detail-image" />
    <div class="detail-content">
      <p class="detail-label">Chi tiet san pham</p>
      <h2>{{ product.name }}</h2>
      <p class="detail-price">{{ product.price | currencyPipe }}</p>
      <div class="detail-actions">
        <a routerLink="/" class="btn-main detail-link">Ve trang chu</a>
      </div>
    </div>
  </div>

  <ng-template #notFound>
    <div class="detail-card" *ngIf="!isLoading">
      <div class="detail-content">
        <p class="detail-label">Chi tiet san pham</p>
        <h2>{{ errorMessage || 'Khong tim thay san pham' }}</h2>
        <a routerLink="/" class="btn-main detail-link">Ve trang chu</a>
      </div>
    </div>
  </ng-template>
</div>
